spring.application.name=Nordic Atlas Packaging
server.port=${PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:atlas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

server.servlet.session.timeout=8h

atlas.upload-dir=${UPLOAD_DIR:./uploads}
atlas.openai.api-key=${OPENAI_API_KEY:}
atlas.openai.model=gpt-image-1
atlas.openai.timeout-seconds=30

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.dk.nap.atlas=INFO
